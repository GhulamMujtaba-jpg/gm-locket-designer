<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM 3D Designer Working</title>
<style>
body{
    margin:0;
    background:#000;
    text-align:center;
    color:white;
    font-family:Arial;
}
.banner{
    font-size:35px;
    padding:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff00cc,#00ffff);
}
input{
    padding:10px;
    margin:15px;
}
button{
    padding:10px 15px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    background:#ff00cc;
    color:white;
}
#container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}
.canvasBox{
    height:220px;
    background:#111;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="banner">GM 3D Designer (Stable)</div>

<input type="text" id="nameInput" placeholder="Enter Name">
<button onclick="generate()">Generate 3D Designs</button>

<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const shapes = [
    "sphere","box","cone","cylinder","torus",
    "tetra","octa","dodeca","icosa"
];

function createShape(type,name){

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
    const renderer = new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(220,220);

    const color = new THREE.Color("hsl(" + Math.random()*360 + ",100%,50%)");

    let geometry;

    switch(type){
        case "sphere": geometry = new THREE.SphereGeometry(2,32,32); break;
        case "box": geometry = new THREE.BoxGeometry(3,3,3); break;
        case "cone": geometry = new THREE.ConeGeometry(2,4,32); break;
        case "cylinder": geometry = new THREE.CylinderGeometry(2,2,4,32); break;
        case "torus": geometry = new THREE.TorusGeometry(2,0.6,16,100); break;
        case "tetra": geometry = new THREE.TetrahedronGeometry(3); break;
        case "octa": geometry = new THREE.OctahedronGeometry(3); break;
        case "dodeca": geometry = new THREE.DodecahedronGeometry(3); break;
        case "icosa": geometry = new THREE.IcosahedronGeometry(3); break;
    }

    const material = new THREE.MeshStandardMaterial({
        color:color,
        metalness:0.6,
        roughness:0.3
    });

    const mesh = new THREE.Mesh(geometry,material);
    scene.add(mesh);

    const light = new THREE.PointLight(0xffffff,1);
    light.position.set(10,10,10);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    camera.position.z = 7;

    function animate(){
        requestAnimationFrame(animate);
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.01;
        renderer.render(scene,camera);
    }
    animate();

    const box = document.createElement("div");
    box.className="canvasBox";
    box.appendChild(renderer.domElement);

    const label = document.createElement("div");
    label.innerText = name;
    label.style.marginTop="5px";
    label.style.fontWeight="bold";
    label.style.color=color.getStyle();

    box.appendChild(label);

    return box;
}

function generate(){

    const container = document.getElementById("container");
    container.innerHTML="";
    const name = document.getElementById("nameInput").value || "GM";

    for(let i=0;i<20;i++){
        const randomShape = shapes[Math.floor(Math.random()*shapes.length)];
        const design = createShape(randomShape,name);
        container.appendChild(design);
    }
}

</script>

</body>
</html>
