<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM 3D Shape Locket Designer</title>

<meta name="description" content="GM 3D Shape Locket Designer - 1000 unique 3D name designs in different geometric shapes.">
<meta name="author" content="GM Official">
<meta name="robots" content="index, follow">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial;
}

.banner{
    font-size:40px;
    padding:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0080,#00ffff);
    background-size:200% 200%;
    animation:move 4s infinite alternate;
}

@keyframes move{
    0%{background-position:0%}
    100%{background-position:100%}
}

input{
    padding:10px;
    margin-top:20px;
    width:250px;
}

button{
    padding:10px 15px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#ff0080;
    color:white;
}

#container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}
.canvasBox{
    height:200px;
    background:#111;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="banner">GM 3D Shape Locket Designer</div>

<input type="text" id="nameInput" placeholder="Enter Name">
<button onclick="generateShapes()">Generate 1000 3D Designs</button>

<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const shapesList = [
"Sphere","Box","Cylinder","Cone","Torus",
"Tetrahedron","Octahedron","Dodecahedron","Icosahedron",
"Plane","Ring"
];

function createShape(type,name){

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
    const renderer = new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(200,200);

    const colors = ["#ff0080","#00ffff","#ffcc00","#00ff00","#ff3300"];
    const randomColor = colors[Math.floor(Math.random()*colors.length)];

    let geometry;

    switch(type){
        case "Sphere":
            geometry = new THREE.SphereGeometry(2,32,32);
            break;
        case "Box":
            geometry = new THREE.BoxGeometry(3,3,3);
            break;
        case "Cylinder":
            geometry = new THREE.CylinderGeometry(2,2,4,32);
            break;
        case "Cone":
            geometry = new THREE.ConeGeometry(2,4,32);
            break;
        case "Torus":
            geometry = new THREE.TorusGeometry(2,0.6,16,100);
            break;
        case "Tetrahedron":
            geometry = new THREE.TetrahedronGeometry(3);
            break;
        case "Octahedron":
            geometry = new THREE.OctahedronGeometry(3);
            break;
        case "Dodecahedron":
            geometry = new THREE.DodecahedronGeometry(3);
            break;
        case "Icosahedron":
            geometry = new THREE.IcosahedronGeometry(3);
            break;
        default:
            geometry = new THREE.BoxGeometry(3,3,3);
    }

    const material = new THREE.MeshStandardMaterial({color:randomColor});
    const mesh = new THREE.Mesh(geometry,material);
    scene.add(mesh);

    const light = new THREE.PointLight(0xffffff,1);
    light.position.set(10,10,10);
    scene.add(light);

    camera.position.z = 7;

    function animate(){
        requestAnimationFrame(animate);
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.01;
        renderer.render(scene,camera);
    }
    animate();

    const div = document.createElement("div");
    div.className="canvasBox";
    div.appendChild(renderer.domElement);

    const label = document.createElement("div");
    label.innerText = name;
    label.style.marginTop="5px";
    label.style.fontWeight="bold";
    label.style.color=randomColor;

    div.appendChild(label);

    return div;
}

function generateShapes(){

    const container = document.getElementById("container");
    container.innerHTML="";
    const name = document.getElementById("nameInput").value || "GM";

    for(let i=0;i<1000;i++){

        const randomShape = shapesList[Math.floor(Math.random()*shapesList.length)];
        const shapeElement = createShape(randomShape,name);
        container.appendChild(shapeElement);

    }
}

</script>

</body>
</html>
