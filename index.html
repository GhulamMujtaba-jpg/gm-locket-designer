<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 500 Locket Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  font-family:Montserrat;
  text-align:center;
}
.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
  color:white;
  letter-spacing:2px;
}
.controls{
  background:#1c1c1c;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
input,select,button{
  padding:8px;
  border-radius:6px;
  border:none;
}
button{
  cursor:pointer;
  background:#ff5e62;
  font-weight:bold;
  color:white;
  transition:0.3s;
}
button:hover{
  background:#ff9966;
  transform:scale(1.05);
}
.preview-area{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}
.design-card{
  background:#1e1e1e;
  padding:10px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  transition:0.3s;
}
.design-card:hover{
  transform:translateY(-5px);
}
.locket{
  width:150px;
  height:150px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:20px;
  font-weight:bold;
  border-radius:50%;
  overflow:hidden;
}
.text{
  z-index:2;
  color:white;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}
.download-btn{
  margin-top:10px;
  background:#00c853;
}
.download-btn:hover{
  background:#69f0ae;
}
.order-form{
  background:#1c1c1c;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}
.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="header">GM Official – 500 Locket Designs</div>

<div class="controls">
  <input type="text" id="nameInput" placeholder="Enter Name">
  <select id="shapeSelect">
    <option value="circle">Circle</option>
    <option value="heart">Heart</option>
    <option value="square">Square</option>
    <option value="star">Star</option>
  </select>
  <select id="fontSelect">
    <option value="Playfair Display">Royal</option>
    <option value="Cinzel">Luxury</option>
    <option value="Great Vibes">Signature</option>
    <option value="Montserrat">Modern</option>
  </select>
  <button onclick="generate500()">Generate 500 Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<div class="order-form">
<h3>Submit Your Order</h3>
<input type="text" id="customerName" placeholder="Your Name"><br><br>
<input type="tel" id="customerPhone" placeholder="Phone Number"><br><br>
<input type="text" id="customerAddress" placeholder="Delivery Address"><br><br>
<button onclick="submitOrder()">Submit Order</button>
<p id="orderMsg"></p>
</div>

<div class="footer">Premium Locket Designs by GM Official</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const previewArea=document.getElementById("previewArea");

function randomColor(){
  return `hsl(${Math.floor(Math.random()*360)},70%,50%)`;
}

function createLocket(name,shape,font){
  let card=document.createElement("div");
  card.className="design-card";

  let locket=document.createElement("div");
  locket.className="locket";
  locket.style.background=randomColor();
  locket.style.fontFamily=font;

  let span=document.createElement("span");
  span.className="text";
  span.innerText=name; 
  locket.appendChild(span);

  card.appendChild(locket);

  let btn=document.createElement("button");
  btn.innerText="Download";
  btn.className="download-btn";
  btn.onclick=function(){
    html2canvas(locket,{scale:3}).then(canvas=>{
      let link=document.createElement("a");
      link.download=name+"_Design.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  };
  card.appendChild(btn);

  return card;
}

function generate500(){
  previewArea.innerHTML="";
  let baseName=document.getElementById("nameInput").value||"GM";

  const shapes=["circle","heart","square","star"];
  const fonts=["Playfair Display","Cinzel","Great Vibes","Montserrat"];

  for(let i=0;i<500;i++){
    let randomShape=shapes[Math.floor(Math.random()*shapes.length)];
    let randomFont=fonts[Math.floor(Math.random()*fonts.length)];
    previewArea.appendChild(createLocket(baseName, randomShape, randomFont));
  }
}

// ----- ORDER SUBMIT -----
async function submitOrder(){
  let cname=document.getElementById("customerName").value;
  let cphone=document.getElementById("customerPhone").value;
  let caddress=document.getElementById("customerAddress").value;
  let designName=document.getElementById("nameInput").value||"GM";

  if(!cname || !cphone || !caddress){
    alert("Please fill all fields!");
    return;
  }

  document.getElementById("orderMsg").innerHTML="Submitting order...";

  const token="<YOUR_GITHUB_TOKEN>"; // Replace with your token
  const gistData={
    description: "GM Official Order",
    public: true,
    files: {
      ["order_"+Date.now()+".txt"]: {
        content: `Design Name: ${designName}\nCustomer Name: ${cname}\nPhone: ${cphone}\nAddress: ${caddress}`
      }
    }
  };

  try{
    let response=await fetch("https://api.github.com/gists",{
      method:"POST",
      headers:{
        "Authorization":"token "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify(gistData)
    });
    if(response.ok){
      document.getElementById("orderMsg").innerHTML="✅ Order submitted! Check your GitHub Gists.";
    }else{
      document.getElementById("orderMsg").innerHTML="❌ Failed to submit order. Check token.";
      console.error(await response.json());
    }
  }catch(err){
    document.getElementById("orderMsg").innerHTML="❌ Error submitting order.";
    console.error(err);
  }
}
</script>

</body>
</html>
