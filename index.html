<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official Jewelry Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0c0c0c;
color:white;
font-family:Montserrat;
text-align:center;
}

.header{
padding:25px;
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#d4af37,#f9e79f,#d4af37);
color:black;
letter-spacing:2px;
}

.controls{
background:#111;
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#d4af37;
font-weight:bold;
}

.preview-area{
margin-top:30px;
display:flex;
justify-content:center;
}

.locket{
width:260px;
height:260px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
font-size:30px;
font-weight:bold;
transition:0.3s;
overflow:hidden;
}

.circle{border-radius:50%;}
.heart{
clip-path:polygon(50% 90%, 90% 50%, 75% 15%, 50% 30%, 25% 15%, 10% 50%);
}

.gold{
background:linear-gradient(145deg,#d4af37,#f9e79f,#b8860b);
box-shadow:0 0 25px #d4af37;
}

.silver{
background:linear-gradient(145deg,#e0e0e0,#ffffff,#a8a8a8);
box-shadow:0 0 20px #ccc;
}

.rose{
background:linear-gradient(145deg,#b76e79,#ffb6c1,#b76e79);
box-shadow:0 0 20px #ffb6c1;
}

.text{
z-index:2;
text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

.shine{
position:absolute;
width:150%;
height:100%;
background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6),transparent 70%);
transform:translateX(-100%);
animation:shine 3s infinite;
}

@keyframes shine{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="header">GM Official Jewelry Studio</div>

<div class="controls">
<input type="text" id="nameInput" placeholder="Enter Name">
<select id="shapeSelect">
<option value="circle">Circle</option>
<option value="heart">Heart</option>
</select>

<select id="materialSelect">
<option value="gold">Gold</option>
<option value="silver">Silver</option>
<option value="rose">Rose Gold</option>
</select>

<select id="fontSelect">
<option value="Playfair Display">Royal</option>
<option value="Cinzel">Luxury</option>
<option value="Great Vibes">Signature</option>
</select>

<button onclick="downloadDesign()">Download HD</button>
</div>

<div class="preview-area">
<div id="locket" class="locket circle gold">
<div class="shine"></div>
<span class="text" id="locketText">GM</span>
</div>
</div>

<div class="footer">Premium Design by GM Official</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const locket=document.getElementById("locket");
const text=document.getElementById("locketText");

document.getElementById("nameInput").oninput=function(){
text.innerText=this.value || "GM";
};

document.getElementById("shapeSelect").onchange=function(){
locket.className="locket "+this.value+" "+document.getElementById("materialSelect").value;
};

document.getElementById("materialSelect").onchange=function(){
locket.className="locket "+document.getElementById("shapeSelect").value+" "+this.value;
};

document.getElementById("fontSelect").onchange=function(){
text.style.fontFamily=this.value;
};

function downloadDesign(){
html2canvas(locket,{scale:4}).then(canvas=>{
let link=document.createElement("a");
link.download="GM_Premium_Locket.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
