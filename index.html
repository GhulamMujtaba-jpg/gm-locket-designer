<!DOCTYPE html>
<html>
<head>
    <title>GM Ultimate 3D Locket Designer</title>
    <style>
        body{
            text-align:center;
            font-family:Arial, sans-serif;
            background:#111;
            color:white;
        }
        input{
            padding:10px;
            width:250px;
            margin-top:20px;
            font-size:16px;
            border-radius:5px;
            border:none;
        }
        button{
            padding:8px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            margin:5px;
        }
        #generateBtn{ background:#ff4081; color:white; }
        #generateBtn:hover{ background:#e91e63; }
        #downloadAllBtn{ background:#4CAF50; color:white; }
        #downloadAllBtn:hover{ background:#45a049; }

        .design-container{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .design-card{
            background:transparent;
            border-radius:50%;
            padding:15px;
            text-align:center;
            width:120px;
            height:120px;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            perspective:500px;
            transition: transform 0.3s;
        }
        .design-card:hover{
            transform: rotateY(10deg) rotateX(10deg) scale(1.1);
        }

        .design-circle{
            width:100px;
            height:100px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:linear-gradient(135deg,#ff0080,#7928ca);
            box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,0,255,0.3);
            transform-style: preserve-3d;
        }

        .design-text{
            font-size:18px;
            font-weight:bold;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:3px;
            flex-wrap:wrap;
        }
        .design-icon{
            width:18px;
            height:18px;
        }

        .download-btn{ background:#ffcc00; color:black; font-size:12px; margin-top:5px;}
        .download-btn:hover{ background:#ffaa00;}
    </style>
</head>
<body>

<h1>GM Ultimate 3D Circular Locket Designer</h1>
<input type="text" id="nameInput" placeholder="Enter Name">
<button id="generateBtn">Generate 1000 Designs</button>
<button id="downloadAllBtn">Download All PNG</button>

<div class="design-container" id="allDesigns"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Colors, Fonts, Icons
const baseColors = ["#ff4d4d","#ff944d","#ffff4d","#4dff4d","#4dffff","#4d4dff","#ff4dff","#ff1a75",
"#ff661a","#99ff33","#33ffcc","#ff3366","#9933ff","#ffcc33","#66ff33","#33ccff","#cc33ff","#ff3399",
"#33ff99","#ff6633","#00ccff","#ff00cc","#ccff00","#ff9900","#00ff99","#9900ff","#ff0066","#66ff00","#ff3300","#00ffcc"];

const fonts = ["Cursive","Arial Black","Impact","Trebuchet MS","Verdana","Tahoma","Georgia","Comic Sans MS","Courier New","Lucida Console"];

const icons = [
    "https://img.icons8.com/emoji/48/000000/mosque.png",
    "https://img.icons8.com/emoji/48/000000/red-heart.png",
    "https://img.icons8.com/emoji/48/000000/arrow.png",
    "https://img.icons8.com/emoji/48/000000/star-emoji.png",
    "https://img.icons8.com/emoji/48/000000/moon-emoji.png"
];

function generateUniqueDesigns(name){
    const container = document.getElementById("allDesigns");
    container.innerHTML="";
    let usedCombos = new Set();
    let count = 0;

    while(count<1000){
        let color = baseColors[Math.floor(Math.random()*baseColors.length)];
        let font = fonts[Math.floor(Math.random()*fonts.length)];
        let scale = (Math.random()*0.4)+0.8;
        let rotateX = (Math.random()*20)-10;
        let rotateY = (Math.random()*20)-10;
        let icon = icons[Math.floor(Math.random()*icons.length)];

        let comboKey = color+"|"+font+"|"+scale.toFixed(2)+"|"+rotateX.toFixed(1)+"|"+rotateY.toFixed(1)+"|"+icon;
        if(usedCombos.has(comboKey)) continue;
        usedCombos.add(comboKey);

        let card = document.createElement("div");
        card.className="design-card";

        let circle = document.createElement("div");
        circle.className="design-circle";
        circle.style.background=`linear-gradient(135deg, ${color}, #000000)`;

        let textDiv = document.createElement("div");
        textDiv.className="design-text";

        let img = document.createElement("img");
        img.src = icon;
        img.className="design-icon";

        let span = document.createElement("span");
        span.innerText=name;
        span.style.fontFamily=font;
        span.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;

        textDiv.appendChild(img);
        textDiv.appendChild(span);
        circle.appendChild(textDiv);

        // Individual download
        let downloadBtn = document.createElement("button");
        downloadBtn.className="download-btn";
        downloadBtn.innerText="Download";
        downloadBtn.addEventListener("click", ()=>{
            html2canvas(circle,{backgroundColor:null}).then(canvas=>{
                let link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download=name+"_locket.png";
                link.click();
            });
        });

        card.appendChild(circle);
        card.appendChild(downloadBtn);
        container.appendChild(card);
        count++;
    }
}

// Generate button
document.getElementById("generateBtn").addEventListener("click", ()=>{
    let name = document.getElementById("nameInput").value || "GM";
    generateUniqueDesigns(name);
});

// Download All
document.getElementById("downloadAllBtn").addEventListener("click", ()=>{
    let container = document.getElementById("allDesigns");
    html2canvas(container,{backgroundColor:null}).then(canvas=>{
        let link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download="GM_Locket_Designs_All.png";
        link.click();
    });
});
</script>

</body>
</html>
