<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 500 Locket Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  font-family:Montserrat;
  text-align:center;
}
.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
  color:white;
  letter-spacing:2px;
}
.controls{
  background:#1c1c1c;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
input,select,button{
  padding:8px;
  border-radius:6px;
  border:none;
}
button{
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}
.preview-area{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}
.design-card{
  background:#1e1e1e;
  padding:10px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  transition:0.3s;
}
.design-card:hover{
  transform:translateY(-5px);
}
.locket{
  width:150px;
  height:150px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:20px;
  font-weight:bold;
  border-radius:50%;
  overflow:hidden;
}
.text{
  z-index:2;
  color:white;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}
.download-btn{
  margin-top:10px;
  background:#00c853;
}
.download-btn:hover{
  background:#69f0ae;
}
.order-btn{
  margin-top:5px;
  background:#2962ff;
}
.order-btn:hover{
  background:#448aff;
}
.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="header">GM Official – 500 Locket Designs</div>

<div class="controls">
  <input type="text" id="nameInput" placeholder="Enter Name">
  
  <!-- Shape select -->
  <select id="shapeSelect">
    <option value="circle">Circle</option>
    <option value="heart">Heart</option>
    <option value="square">Square</option>
    <option value="star">Star</option>
  </select>

  <!-- Style/Font select -->
  <select id="fontSelect">
    <option value="Playfair Display">Royal</option>
    <option value="Cinzel">Luxury</option>
    <option value="Great Vibes">Signature</option>
    <option value="Montserrat">Modern</option>
  </select>

  <!-- File Upload -->
  <input type="file" id="photoUpload" accept="image/*">

  <!-- Mockup select -->
  <select id="mockupSelect">
    <option value="neck">Neck</option>
    <option value="box">Box</option>
    <option value="model">Model</option>
  </select>

  <button style="background:#ff5e62;" onclick="generate500()">Generate 500 Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<div class="footer">Premium Locket Designs by GM Official</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const previewArea=document.getElementById("previewArea");

// Mockup images
const mockups={
  neck:"https://i.ibb.co/1Z6V0gB/neck-mockup.png",
  box:"https://i.ibb.co/7gX9J2r/box-mockup.png",
  model:"https://i.ibb.co/8cxkqTz/model-mockup.png"
};

function randomColor(){
  return `hsl(${Math.floor(Math.random()*360)},70%,50%)`;
}

function createLocket(name,shape,font,photo,mockupType){
  let card=document.createElement("div");
  card.className="design-card";

  let locket=document.createElement("div");
  locket.className="locket";
  locket.style.background=randomColor();
  locket.style.fontFamily=font;

  // Mockup image
  let img=document.createElement("img");
  img.src=mockups[mockupType]||mockups.neck;
  img.style.position="absolute";
  img.style.width="100%";
  img.style.height="100%";
  img.style.top="0";
  img.style.left="0";
  img.style.objectFit="cover";
  locket.appendChild(img);

  // Uploaded file if exists
  if(photo){
    let userPhoto=document.createElement("img");
    userPhoto.src=photo;
    userPhoto.style.position="absolute";
    userPhoto.style.width="100%";
    userPhoto.style.height="100%";
    userPhoto.style.top="0";
    userPhoto.style.left="0";
    userPhoto.style.objectFit="cover";
    locket.appendChild(userPhoto);
  }

  // Name text
  let span=document.createElement("span");
  span.className="text";
  span.innerText=name;
  locket.appendChild(span);

  card.appendChild(locket);

  // Download button
  let downloadBtn=document.createElement("button");
  downloadBtn.innerText="Download";
  downloadBtn.className="download-btn";
  downloadBtn.onclick=function(){
    html2canvas(locket,{scale:3}).then(canvas=>{
      let link=document.createElement("a");
      link.download=name+"_Design.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  };
  card.appendChild(downloadBtn);

  // Order Submit button for each design
  let orderBtn=document.createElement("button");
  orderBtn.innerText="Submit Order";
  orderBtn.className="order-btn";
  orderBtn.onclick=function(){submitOrder(name);}
  card.appendChild(orderBtn);

  return card;
}

// Generate 500 designs
function generate500(){
  previewArea.innerHTML="";
  let baseName=document.getElementById("nameInput").value||"GM";
  let photo=document.getElementById("photoUpload").files[0]?URL.createObjectURL(document.getElementById("photoUpload").files[0]):null;
  let selectedMockup=document.getElementById("mockupSelect").value;

  const shapes=["circle","heart","square","star"];
  const fonts=["Playfair Display","Cinzel","Great Vibes","Montserrat"];

  for(let i=0;i<500;i++){
    let randomShape=shapes[Math.floor(Math.random()*shapes.length)];
    let randomFont=fonts[Math.floor(Math.random()*fonts.length)];
    previewArea.appendChild(createLocket(baseName, randomShape, randomFont, photo, selectedMockup));
  }
}

// ----- ORDER SUBMIT for each design -----
async function submitOrder(designName){
  let cname=prompt("Enter Your Name:");
  if(!cname) return alert("Name required!");
  let cphone=prompt("Enter Phone Number:");
  if(!cphone) return alert("Phone required!");
  let caddress=prompt("Enter Delivery Address:");
  if(!caddress) return alert("Address required!");

  const token="<YOUR_GITHUB_TOKEN>"; // Replace with your GitHub token
  const gistData={
    description: "GM Official Order",
    public: true,
    files: {
      ["order_"+Date.now()+".txt"]: {
        content: `Design Name: ${designName}\nCustomer Name: ${cname}\nPhone: ${cphone}\nAddress: ${caddress}`
      }
    }
  };

  try{
    let response=await fetch("https://api.github.com/gists",{
      method:"POST",
      headers:{
        "Authorization":"token "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify(gistData)
    });
    if(response.ok){
      alert("✅ Order submitted for " + designName + "!");
    }else{
      alert("❌ Failed to submit order. Check token.");
      console.error(await response.json());
    }
  }catch(err){
    alert("❌ Error submitting order.");
    console.error(err);
  }
}
</script>

</body>
</html>
