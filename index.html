<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM 3D Locket Designer PRO MAX</title>

<style>
body{
    background:#0f0f0f;
    font-family:Arial;
    text-align:center;
    color:white;
    margin:0;
}

.banner{
    font-size:32px;
    padding:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0080,#7928ca,#00ffff);
    background-size:300% 300%;
    animation: move 6s infinite alternate;
}

@keyframes move{
0%{background-position:0%}
100%{background-position:100%}
}

input{
padding:10px;
width:250px;
border:none;
border-radius:8px;
margin:20px;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

#generateBtn{background:#ff4081;color:white;}

.design-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.design-card{
padding:15px;
border-radius:20px;
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.design-card:hover{
transform:scale(1.08) rotateY(8deg);
}

.locket{
padding:25px;
font-weight:bold;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-shadow:0 0 10px rgba(0,0,0,0.6);
}

.circle{border-radius:50%;}
.oval{border-radius:50% / 40%;}
.square{border-radius:15px;}
.rectangle{border-radius:25px;}
.heart{
clip-path:polygon(50% 90%, 90% 50%, 75% 15%, 50% 30%, 25% 15%, 10% 50%);
}
.star{
clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}

.download-btn{
margin-top:8px;
background:#ffcc00;
color:black;
}
</style>
</head>
<body>

<div class="banner">GM 3D Locket Designer PRO MAX</div>

<input type="text" id="nameInput" placeholder="Enter Name">
<br>
<button id="generateBtn">Generate 200+ Designs</button>

<div class="design-container" id="designArea"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const shapes=["circle","oval","square","rectangle","heart","star"];
const fonts=["Arial","Georgia","Verdana","Trebuchet MS","Comic Sans MS","Impact"];
const textures=[
"linear-gradient(135deg,#FFD700,#FFA500)", // gold
"linear-gradient(135deg,#C0C0C0,#808080)", // silver
"linear-gradient(135deg,#00ffff,#0066ff)", // diamond
"linear-gradient(135deg,#ff0080,#7928ca)",
"linear-gradient(135deg,#00ffcc,#0099ff)"
];

function generateDesigns(name){

let area=document.getElementById("designArea");
area.innerHTML="";

for(let i=0;i<200;i++){

let card=document.createElement("div");
card.className="design-card";
card.style.background=textures[random(textures.length)];

let locket=document.createElement("div");
locket.className="locket "+shapes[random(shapes.length)];
locket.style.background=textures[random(textures.length)];
locket.style.fontFamily=fonts[random(fonts.length)];
locket.style.transform=`perspective(400px) rotateX(${randDeg()}deg) rotateY(${randDeg()}deg) scale(${randScale()})`;
locket.innerText=name;

let btn=document.createElement("button");
btn.className="download-btn";
btn.innerText="Download";

btn.onclick=function(){
html2canvas(locket,{backgroundColor:null,scale:3}).then(canvas=>{
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download=name+"_GM_Locket.png";
link.click();
});
};

card.appendChild(locket);
card.appendChild(btn);
area.appendChild(card);
}

}

function random(max){return Math.floor(Math.random()*max);}
function randDeg(){return Math.floor(Math.random()*40)-20;}
function randScale(){return (Math.random()*0.5+0.8);}

document.getElementById("generateBtn").onclick=function(){
let name=document.getElementById("nameInput").value || "GM";
generateDesigns(name);
};

</script>

</body>
</html>
