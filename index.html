<!DOCTYPE html>
<html>
<head>
    <title>GM Locket Designer 3D</title>
    <style>
        body{
            text-align:center;
            font-family:Arial, sans-serif;
            background:#222;
            color:white;
        }
        input{
            padding:10px;
            width:250px;
            margin-top:20px;
            font-size:16px;
            border-radius:5px;
            border:none;
        }
        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            margin:5px;
        }
        #generateBtn{ background:#ff4081; color:white; }
        #generateBtn:hover{ background:#e91e63; }
        #downloadBtn{ background:#4CAF50; color:white; }
        #downloadBtn:hover{ background:#45a049; }

        .design-container{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
            gap:10px;
            margin-top:20px;
        }

        .design{
            padding:20px;
            border-radius:12px;
            background: linear-gradient(135deg, #ff0080, #7928ca);
            font-size:26px;
            font-weight:bold;
            text-align:center;
            color:white;
            transform: perspective(200px) rotateX(10deg) rotateY(-10deg);
            transition: transform 0.3s, scale 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .design:hover{
            transform: perspective(200px) rotateX(0deg) rotateY(0deg) scale(1.1);
        }

    </style>
</head>
<body>

<h1>GM 3D Locket Designer</h1>
<input type="text" id="nameInput" placeholder="Enter Name">
<button id="generateBtn">Generate 100 Designs</button>
<button id="downloadBtn">Download PNG</button>

<div class="design-container" id="allDesigns"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const baseColors = [
    "#ff4d4d","#ff944d","#ffff4d","#4dff4d","#4dffff","#4d4dff","#ff4dff","#ff1a75",
    "#ff661a","#99ff33","#33ffcc","#ff3366","#9933ff","#ffcc33","#66ff33","#33ccff",
    "#cc33ff","#ff3399","#33ff99","#ff6633"
]; // 20 base colors

const fonts = [
    "Cursive","Arial Black","Impact","Trebuchet MS","Verdana","Tahoma","Georgia","Comic Sans MS","Courier New","Lucida Console"
]; // 10 fonts

// Generate 100 unique locket styles
function generateUniqueDesigns(name){
    const container = document.getElementById("allDesigns");
    container.innerHTML=""; // clear previous

    let usedCombos = new Set();

    let count = 0;
    while(count < 100){
        let color = baseColors[Math.floor(Math.random()*baseColors.length)];
        let font = fonts[Math.floor(Math.random()*fonts.length)];
        let scale = (Math.random()*0.4)+0.8; // 0.8 to 1.2
        let rotateX = (Math.random()*20)-10; // -10 to 10
        let rotateY = (Math.random()*20)-10; // -10 to 10

        let comboKey = color+"|"+font+"|"+scale.toFixed(2)+"|"+rotateX.toFixed(1)+"|"+rotateY.toFixed(1);
        if(usedCombos.has(comboKey)) continue; // skip repeat
        usedCombos.add(comboKey);

        let div = document.createElement("div");
        div.className="design";
        div.innerText=name;

        div.style.background=`linear-gradient(135deg, ${color}, #000000)`;
        div.style.fontFamily=font;
        div.style.transform=`perspective(200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;

        container.appendChild(div);
        count++;
    }
}

// Generate button
document.getElementById("generateBtn").addEventListener("click", function(){
    let name = document.getElementById("nameInput").value || "GM";
    generateUniqueDesigns(name);
});

// Download all designs as image
document.getElementById("downloadBtn").addEventListener("click", function(){
    let container = document.getElementById("allDesigns");
    html2canvas(container).then(canvas=>{
        let link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download="GM_Locket_Designs.png";
        link.click();
    });
});
</script>

</body>
</html>
