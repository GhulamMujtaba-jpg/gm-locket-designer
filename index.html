<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – Ultra PRO Locket Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#111;color:white;font-family:Montserrat;text-align:center;}
.header{padding:20px;font-size:28px;font-weight:bold;background:linear-gradient(90deg,#ff6f61,#fdd835,#ff6f61);color:black;letter-spacing:2px;}
.controls{background:#222;padding:15px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;}
input,select,button{padding:8px;border-radius:6px;border:none;font-weight:bold;}
button{cursor:pointer;background:#ff6f61;color:white;}
.preview-area{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;}
.locket-container{position:relative;text-align:center;}
.locket{width:160px;height:160px;display:flex;align-items:center;justify-content:center;position:relative;border-radius:50%;overflow:hidden;transition:0.3s;}
.locket img.mockup{position:absolute;width:100%;height:100%;object-fit:cover;top:0;left:0;z-index:0;}
.locket-text{position:absolute;width:140px;height:140px;display:flex;align-items:center;justify-content:center;z-index:2;color:white;font-family:'Great Vibes',cursive;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.6);}
.download-btn{margin-top:5px;padding:5px 10px;background:#ffcc00;color:black;border:none;border-radius:5px;cursor:pointer;font-weight:bold;}
.shine{position:absolute;width:150%;height:100%;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6),transparent 70%);transform:translateX(-100%);animation:shine 3s infinite;}
@keyframes shine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.order-form{background:#222;padding:15px;margin:20px auto;max-width:450px;border-radius:10px;}
.order-form input, .order-form select{width:calc(100% - 20px);margin:5px 0;}
.footer{margin-top:20px;font-size:12px;opacity:0.6;}
</style>
</head>
<body>

<div class="header">GM Official – Ultra PRO Locket Designer</div>

<div class="controls">
<input type="text" id="nameInput" placeholder="Enter Name">
<select id="shapeSelect">
<option value="circle">Circle</option>
<option value="heart">Heart</option>
<option value="square">Square</option>
<option value="star">Star</option>
</select>
<input type="file" id="photoUpload" accept="image/*">
<select id="mockupSelect">
<option value="neck">Neck</option>
<option value="box">Box</option>
<option value="model">Model</option>
</select>
<button onclick="generateDesigns()">Generate 1000 Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<div class="order-form">
<h3>Place Your Order</h3>
<input type="text" id="customerName" placeholder="Your Name">
<input type="tel" id="customerPhone" placeholder="Phone Number">
<input type="text" id="customerAddress" placeholder="Delivery Address">
<select id="orderMaterial">
<option value="Gold">Gold</option>
<option value="Silver">Silver</option>
<option value="Rose Gold">Rose Gold</option>
</select>
<button onclick="sendWhatsAppOrder()">Order via WhatsApp</button>
<button onclick="payOnline()">Pay Online</button>
<p id="totalPrice">Price: PKR 2500</p>
</div>

<div class="footer">Premium Locket Designs by GM Official</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const previewArea=document.getElementById("previewArea");
const shapes=["circle","heart","square","star"];
const mockups={
neck:"https://i.ibb.co/1Z6V0gB/neck-mockup.png",
box:"https://i.ibb.co/7gX9J2r/box-mockup.png",
model:"https://i.ibb.co/8cxkqTz/model-mockup.png"
};

function randomColor(){return `hsl(${Math.floor(Math.random()*360)},${Math.floor(Math.random()*50)+50}%,${Math.floor(Math.random()*30)+40}%)`;}

// create single locket container
function createLocket(name,shape,photo,mockupType){
    let container=document.createElement("div");
    container.className="locket-container";

    let div=document.createElement("div");
    div.className="locket "+shape;
    div.style.background=randomColor();

    let mockup=document.createElement("img");
    mockup.src=mockups[mockupType]||mockups.neck;
    mockup.className="mockup";
    div.appendChild(mockup);

    if(photo){
        let userPhoto=document.createElement("img");
        userPhoto.src=photo;
        userPhoto.className="mockup";
        div.appendChild(userPhoto);
    }

    let shine=document.createElement("div");
    shine.className="shine";
    div.appendChild(shine);

    let text=document.createElement("div");
    text.className="locket-text";
    text.innerText=name;
    div.appendChild(text);

    container.appendChild(div);

    // download button
    let btn=document.createElement("button");
    btn.className="download-btn";
    btn.innerText="Download";
    btn.onclick=()=>{
        html2canvas(div,{scale:4}).then(canvas=>{
            let link=document.createElement("a");
            link.href=canvas.toDataURL();
            link.download=name+"_GM_Locket.png";
            link.click();
        });
    };
    container.appendChild(btn);

    return container;
}

// generate 1000 unique lockets
function generateDesigns(){
    previewArea.innerHTML="";
    let name=document.getElementById("nameInput").value||"GM";
    let photo=document.getElementById("photoUpload").files[0]?URL.createObjectURL(document.getElementById("photoUpload").files[0]):null;
    let mockup=document.getElementById("mockupSelect").value;
    let used=new Set();
    let count=0;
    while(count<1000){
        let shape=shapes[Math.floor(Math.random()*shapes.length)];
        let key=shape+"|"+Math.floor(Math.random()*360)+"|"+Math.floor(Math.random()*100);
        if(used.has(key)) continue;
        used.add(key);
        let l=createLocket(name,shape,photo,mockup);
        l.querySelector(".locket").style.transform=`rotateY(${(Math.random()*60)-30}deg) rotateX(${(Math.random()*40)-20}deg)`;
        previewArea.appendChild(l);
        count++;
    }
}

// price calculator
function updatePrice(){
    let material=document.getElementById("orderMaterial").value;
    let price=0;
    if(material=="Gold") price=2500;
    else if(material=="Silver") price=1800;
    else if(material=="Rose Gold") price=2200;
    document.getElementById("totalPrice").innerText="Price: PKR "+price;
}
document.getElementById("orderMaterial").onchange=updatePrice;
updatePrice();

// WhatsApp order
function sendWhatsAppOrder(){
    let cname=document.getElementById("customerName").value;
    let cphone=document.getElementById("customerPhone").value;
    let caddress=document.getElementById("customerAddress").value;
    let designName=document.getElementById("nameInput").value||"GM";
    if(!cname||!cphone||!caddress){alert("Please fill all fields!");return;}
    let message=`Hello GM Official,%0AI want to order a locket.%0AName: ${designName}%0ACustomer Name: ${cname}%0APhone: ${cphone}%0AAddress: ${caddress}`;
    let whatsappUrl=`https://wa.me/923000000000?text=${message}`;
    window.open(whatsappUrl,"_blank");
}

// Online payment placeholder
function payOnline(){ alert("Online Payment coming soon! Integrate JazzCash/EasyPaisa API here."); }

</script>
</body>
</html>
