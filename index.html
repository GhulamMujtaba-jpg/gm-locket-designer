<!DOCTYPE html>
<html>
<head>
    <title>GM Locket Designer</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f2f2f2;
        }
        input{
            padding:10px;
            width:200px;
            margin-top:20px;
        }
        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        #heart{
            font-family:'Cursive', Arial;
            font-size:40px;
            color:hotpink;
            text-shadow:2px 2px 5px red;
            margin:20px 0;
        }

        #downloadBtn{
            background:#ff4081;
            color:white;
            margin:10px 5px;
        }
        #downloadBtn:hover{ background:#e91e63; }

        #downloadImageBtn{
            background:#4CAF50;
            color:white;
            margin:10px 5px;
        }
        #downloadImageBtn:hover{ background:#45a049; }

        .design-container{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
            gap:10px;
            margin-top:20px;
        }

        .design{
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            background:#111;
            color:white;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            text-align:center;
            transform: rotateX(5deg) rotateY(3deg);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .design:hover{
            transform: rotateX(0deg) rotateY(0deg) scale(1.05);
            box-shadow: 4px 4px 15px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<h1>GM Name Locket Designer</h1>

<input type="text" id="nameInput" placeholder="Enter Name">
<button onclick="generateMultipleDesigns()">Generate</button>

<div class="design" id="heart">💖 <span id="heartName"></span> 💖</div>

<h2>All Designs Preview</h2>
<div class="design-container" id="allDesigns"></div>

<button id="downloadBtn">Download Text</button>
<button id="downloadImageBtn">Download as Image</button>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
    // Array of random styles
    const styles = [
        "color: hotpink; font-family: 'Cursive'; text-shadow:2px 2px 5px red; font-size:24px;",
        "color: purple; font-family: 'Arial Black'; text-shadow:1px 1px 3px gold; font-size:26px;",
        "color: blue; font-family: 'Verdana'; text-shadow:0 0 10px cyan; font-size:28px;",
        "color: green; font-family: 'Tahoma'; text-shadow:2px 2px 8px lime; font-size:24px;",
        "color: orange; font-family: 'Georgia'; text-shadow:1px 1px 4px red; font-size:26px;",
        "color: cyan; font-family:'Impact'; text-shadow:2px 2px 6px navy; font-size:25px;",
        "color: magenta; font-family:'Trebuchet MS'; text-shadow:1px 1px 5px purple; font-size:24px;",
        "color: yellow; font-family:'Comic Sans MS'; text-shadow:0 0 8px orange; font-size:27px;",
        "color: lime; font-family:'Tahoma'; text-shadow:2px 2px 5px green; font-size:26px;",
        "color: red; font-family:'Arial'; text-shadow:2px 2px 8px darkred; font-size:25px;",
        // Add more up to 50 styles
    ];

    function generateMultipleDesigns(){
        let name = document.getElementById("nameInput").value || "GM";
        let container = document.getElementById("allDesigns");
        container.innerHTML = ""; // Clear previous designs

        for(let i=0;i<50;i++){
            let div = document.createElement("div");
            div.className = "design";
            div.innerText = name;

            // Random style
            let randomStyle = styles[Math.floor(Math.random() * styles.length)];
            div.style = randomStyle;

            container.appendChild(div);
        }

        // Update heart preview
        document.getElementById("heartName").innerText = name;
    }

    // Download Text
    document.getElementById("downloadBtn").addEventListener("click", function(){
        let container = document.getElementById("allDesigns");
        let allText = "";
        container.querySelectorAll(".design").forEach(div => { allText += div.innerText + "\n"; });
        allText += "\nHeart Design: " + document.getElementById("heartName").innerText;

        let blob = new Blob([allText], {type:"text/plain"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download="AllLocketDesigns.txt";
        link.click();
    });

    // Download PNG
    document.getElementById("downloadImageBtn").addEventListener("click", function(){
        let container = document.getElementById("allDesigns");
        html2canvas(container).then(canvas => {
            let link = document.createElement("a");
            link.href = canvas.toDataURL("image/png");
            link.download="AllLocketDesigns.png";
            link.click();
        });
    });
</script>

</body>
</html>
