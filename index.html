<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GM Ultra-Realistic Metal & Glass 3D Locket Designer</title>
<meta name="description" content="Create 1000+ ultra-realistic 3D locket designs with metal & glass textures, overlapping letters, Islamic backgrounds, reflections, neon glow. Printing & social media ready.">
<meta name="keywords" content="3D locket, metal texture, glass reflection, printing ready, name locket, Islamic background, overlapping letters, neon glow, GM locket designer">
<meta name="author" content="GM Official">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://yourusername.github.io/your-repo-name/">

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:0;
}
input{
    padding:10px;
    width:250px;
    margin-top:20px;
    font-size:16px;
    border-radius:5px;
    border:none;
}
button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    margin:5px;
}
#generateBtn{ background:#ff4081; color:white; }
#generateBtn:hover{ background:#e91e63; }
#downloadAllBtn{ background:#4CAF50; color:white; }
#downloadAllBtn:hover{ background:#45a049; }

.design-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.design-card{
    width:150px;
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    perspective:1200px;
    transition: transform 0.5s;
}
.design-card:hover{
    transform: rotateY(25deg) rotateX(15deg) scale(1.1);
}

.design-circle{
    width:130px;
    height:130px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background-size:cover;
    position:relative;
    overflow:hidden;
    /* Realistic metal + glass effect */
    box-shadow: 
        inset 0 0 20px rgba(255,255,255,0.4),
        inset 0 0 50px rgba(255,255,255,0.2),
        0 0 15px rgba(255,255,255,0.2),
        0 0 40px rgba(255,0,255,0.2);
    background-blend-mode: overlay;
    animation: neonGlow 2s infinite alternate;
}

@keyframes neonGlow{
    0% { box-shadow: inset 0 0 10px rgba(255,255,255,0.2), inset 0 0 30px rgba(255,0,255,0.2), 0 0 20px rgba(255,0,255,0.3), 0 0 40px rgba(255,0,255,0.2);}
    100% { box-shadow: inset 0 0 25px rgba(255,255,255,0.4), inset 0 0 60px rgba(255,0,255,0.3), 0 0 50px rgba(255,0,255,0.5), 0 0 80px rgba(255,0,255,0.3);}
}

.design-text{
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:-10px; /* overlapping letters */
    flex-wrap:wrap;
    font-weight:bold;
    color:white;
    /* Realistic metal / glass text shadow */
    text-shadow: 
        0 2px 3px rgba(0,0,0,0.7), 
        0 0 5px #fff, 
        0 0 10px #ff00ff, 
        0 0 15px #ff00ff, 
        0 0 20px #ff00ff;
}

.letter{
    display:inline-block;
    transform-origin:center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
}

.download-btn{
    background:#ffcc00;
    color:black;
    font-size:12px;
    margin-top:5px;
    border-radius:5px;
}
.download-btn:hover{
    background:#ffaa00;
}
</style>
</head>
<body>

<h1>GM Ultra-Realistic Metal & Glass 3D Locket Designer</h1>
<input type="text" id="nameInput" placeholder="Enter Name">
<button id="generateBtn">Generate 1000 Designs</button>
<button id="downloadAllBtn">Download All PNG</button>

<div class="design-container" id="allDesigns"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Realistic Islamic + decorative backgrounds
const backgrounds = [
    "https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Al_Masjid_Al-Haram_Makkah.jpg/120px-Al_Masjid_Al-Haram_Makkah.jpg",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Islamic_pattern.png/120px-Islamic_pattern.png",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Moon_star.png/120px-Moon_star.png",
    "https://img.icons8.com/emoji/96/000000/red-heart.png",
    "https://img.icons8.com/emoji/96/000000/star-emoji.png"
];

const fonts = ["Cursive","Arial Black","Impact","Trebuchet MS","Verdana","Tahoma","Georgia","Comic Sans MS","Courier New","Lucida Console"];

function generateUniqueDesigns(name){
    const container = document.getElementById("allDesigns");
    container.innerHTML="";
    let usedCombos = new Set();
    let count = 0;

    while(count<1000){
        let bg = backgrounds[Math.floor(Math.random()*backgrounds.length)];
        let font = fonts[Math.floor(Math.random()*fonts.length)];
        let rotateX = (Math.random()*40)-20;
        let rotateY = (Math.random()*40)-20;
        let scale = (Math.random()*0.6)+0.8;

        let comboKey = bg+"|"+font+"|"+rotateX.toFixed(1)+"|"+rotateY.toFixed(1)+"|"+scale.toFixed(2);
        if(usedCombos.has(comboKey)) continue;
        usedCombos.add(comboKey);

        let card = document.createElement("div");
        card.className="design-card";

        let circle = document.createElement("div");
        circle.className="design-circle";
        circle.style.backgroundImage = `url(${bg})`;

        let textDiv = document.createElement("div");
        textDiv.className="design-text";
        for(let char of name){
            let span = document.createElement("span");
            span.className="letter";
            span.innerText = char;
            span.style.fontFamily = font;
            span.style.transform = `rotate(${Math.random()*50-25}deg) scale(${scale})`;
            textDiv.appendChild(span);
        }

        let downloadBtn = document.createElement("button");
        downloadBtn.className="download-btn";
        downloadBtn.innerText="Download";
        downloadBtn.addEventListener("click", ()=>{
            html2canvas(circle,{backgroundColor:null}).then(canvas=>{
                let link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download=name+"_locket.png";
                link.click();
            });
        });

        circle.appendChild(textDiv);
        card.appendChild(circle);
        card.appendChild(downloadBtn);
        container.appendChild(card);
        count++;
    }
}

document.getElementById("generateBtn").addEventListener("click", ()=>{
    let name = document.getElementById("nameInput").value || "GM";
    generateUniqueDesigns(name);
});

document.getElementById("downloadAllBtn").addEventListener("click", ()=>{
    let container = document.getElementById("allDesigns");
    html2canvas(container,{backgroundColor:null}).then(canvas=>{
        let link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download="GM_Locket_Designs_All.png";
        link.click();
    });
});
</script>

</body>
</html>
