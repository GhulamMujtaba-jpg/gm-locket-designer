<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 300 Locket Designs PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Montserrat;
text-align:center;
}

.header{
padding:20px;
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff9966,#ff5e62);
color:white;
letter-spacing:2px;
}

.controls{
background:#1c1c1c;
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

input,select,button{
padding:8px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#ff5e62;
font-weight:bold;
color:white;
transition:0.3s;
}

button:hover{
background:#ff9966;
transform:scale(1.05);
}

.preview-area{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.design-card{
background:#1e1e1e;
padding:10px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:0.3s;
}

.design-card:hover{
transform:translateY(-5px);
}

.locket{
width:150px;
height:150px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
position:relative;
font-size:20px;
font-weight:bold;
border-radius:50%;
overflow:hidden;
}

.text{
z-index:2;
}

.download-btn{
margin-top:10px;
background:#00c853;
}

.download-btn:hover{
background:#69f0ae;
}

.order-form{
background:#1c1c1c;
padding:20px;
margin:20px auto;
max-width:450px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>
<body>

<div class="header">GM Official – 300 Locket Designs PRO</div>

<div class="controls">
<input type="text" id="nameInput" placeholder="Enter Name">
<button onclick="generate300()">Generate Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<div class="order-form">
<h3>Submit Order</h3>
<input type="text" id="customerName" placeholder="Your Name"><br><br>
<input type="tel" id="customerPhone" placeholder="Phone Number"><br><br>
<input type="text" id="customerAddress" placeholder="Delivery Address"><br><br>
<button onclick="submitOrder()">Submit Order</button>
<p id="orderMsg"></p>
</div>

<div class="footer">Premium Locket Designs by GM Official</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const previewArea=document.getElementById("previewArea");

function randomColor(){
return `hsl(${Math.floor(Math.random()*360)},70%,50%)`;
}

function createDesign(name){

let card=document.createElement("div");
card.className="design-card";

let locket=document.createElement("div");
locket.className="locket";
locket.style.background=randomColor();
locket.innerHTML="<span class='text'>"+name+"</span>";

let btn=document.createElement("button");
btn.innerText="Download";
btn.className="download-btn";

btn.onclick=function(){
html2canvas(locket,{scale:3}).then(canvas=>{
let link=document.createElement("a");
link.download=name+"_Design.png";
link.href=canvas.toDataURL();
link.click();
});
};

card.appendChild(locket);
card.appendChild(btn);

return card;
}

function generate300(){
previewArea.innerHTML="";
let name=document.getElementById("nameInput").value||"GM";
for(let i=0;i<20;i++){   // performance ke liye 20 kar diya (300 slow hota hai)
previewArea.appendChild(createDesign(name));
}
}

function submitOrder(){
let name=document.getElementById("customerName").value;
let phone=document.getElementById("customerPhone").value;
let address=document.getElementById("customerAddress").value;

if(!name||!phone||!address){
alert("Please fill all fields");
return;
}

document.getElementById("orderMsg").innerHTML=
"✅ Order Submitted Successfully! We will contact you soon.";

}

</script>

</body>
</html>
