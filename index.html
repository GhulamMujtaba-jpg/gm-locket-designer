<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GM Ultra PRO 3D Locket Designer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#0d0d0d;
    color:white;
    text-align:center;
    font-family:Arial;
}

input{
    padding:12px;
    width:260px;
    font-size:16px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
}

#generateBtn{background:gold;}
#downloadBtn{background:silver;}

.design-area{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.locket{
    width:400px;
    height:400px;
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    
    /* Metal Ring */
    background:
    radial-gradient(circle at 30% 30%, #ffffff55, transparent 40%),
    radial-gradient(circle at 70% 70%, #00000055, transparent 40%),
    linear-gradient(45deg,#d4af37,#f7e98e,#b8860b);
    
    box-shadow:
    inset 0 0 40px rgba(0,0,0,0.6),
    0 0 50px rgba(255,215,0,0.4);
}

/* Glass Reflection */
.locket::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    background:radial-gradient(circle at 30% 20%, #ffffff88, transparent 50%);
    pointer-events:none;
}

.name{
    position:absolute;
    display:flex;
    gap:-15px;
    font-size:60px;
    font-weight:bold;
    letter-spacing:-10px;
}

.letter{
    display:inline-block;
    transform-origin:center;
}

/* GOLD TEXT */
.gold{
    background:linear-gradient(#fff8dc,#ffd700,#b8860b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
    2px 2px 3px rgba(0,0,0,0.7),
    -1px -1px 2px #fff,
    0 0 10px gold;
}

/* SILVER TEXT */
.silver{
    background:linear-gradient(#ffffff,#c0c0c0,#808080);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
    2px 2px 3px rgba(0,0,0,0.7),
    -1px -1px 2px #fff,
    0 0 10px silver;
}
</style>
</head>

<body>

<h1>GM Ultra PRO Locket Designer</h1>

<input type="text" id="nameInput" placeholder="Enter Name">
<br><br>
<button id="generateBtn">Generate Design</button>
<button id="downloadBtn">Download High-Res PNG</button>

<div class="design-area">
    <div class="locket" id="locket">
        <div class="name" id="nameArea"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function generateDesign(){
    let name = document.getElementById("nameInput").value || "GM";
    let nameArea = document.getElementById("nameArea");
    nameArea.innerHTML="";

    let metalType = Math.random() > 0.5 ? "gold" : "silver";

    for(let char of name){
        let span = document.createElement("span");
        span.className="letter " + metalType;
        span.innerText = char;
        span.style.transform = "rotate("+(Math.random()*30-15)+"deg)";
        nameArea.appendChild(span);
    }
}

document.getElementById("generateBtn").addEventListener("click",generateDesign);

document.getElementById("downloadBtn").addEventListener("click",function(){

    html2canvas(document.getElementById("locket"),{
        backgroundColor:null,
        scale:5  // HIGH RES EXPORT
    }).then(canvas=>{
        let link = document.createElement("a");
        link.download="GM_Locket_HighRes.png";
        link.href=canvas.toDataURL("image/png");
        link.click();
    });

});

</script>

</body>
</html>
