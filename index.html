<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM Real 1000 Unique 3D Locket Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

input{
    padding:12px;
    width:260px;
    font-size:16px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
}

.container{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:30px;
}

.locket{
    width:200px;
    height:200px;
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.locket::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.5), transparent 50%);
    pointer-events:none;
}

.name{
    position:absolute;
    display:flex;
    font-size:32px;
    font-weight:bold;
}

.letter{
    display:inline-block;
    transform-origin:center;
}

.download{
    margin-top:8px;
    font-size:12px;
    background:white;
    color:black;
    padding:5px 10px;
}
</style>
</head>

<body>

<h2>GM Real 1000 Unique 3D Locket Generator</h2>

<input type="text" id="nameInput" placeholder="Enter Name">
<br><br>
<button onclick="generate()">Generate 1000 Designs</button>

<div class="container" id="container"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const gradients=[
"linear-gradient(45deg,#ff0000,#ff9900)",
"linear-gradient(45deg,#00ffcc,#0066ff)",
"linear-gradient(45deg,#ff00cc,#6600ff)",
"linear-gradient(45deg,#00ff00,#003300)",
"linear-gradient(45deg,#ffff00,#ff6600)",
"linear-gradient(45deg,#ffffff,#999999)",
"linear-gradient(45deg,#ff1493,#8a2be2)",
"linear-gradient(45deg,#00ffff,#0000ff)",
"linear-gradient(45deg,#ff4500,#ffd700)",
"linear-gradient(45deg,#ff69b4,#ff0000)",
"linear-gradient(45deg,#00fa9a,#006400)",
"linear-gradient(45deg,#f0e68c,#b8860b)",
"linear-gradient(45deg,#87ceeb,#00008b)",
"linear-gradient(45deg,#ffa500,#8b0000)",
"linear-gradient(45deg,#e6e6fa,#4b0082)",
"linear-gradient(45deg,#ffb6c1,#c71585)",
"linear-gradient(45deg,#7fffd4,#2e8b57)",
"linear-gradient(45deg,#dc143c,#8b0000)",
"linear-gradient(45deg,#adff2f,#006400)",
"linear-gradient(45deg,#ffd700,#daa520)"
];

function randomPattern(){
    return `radial-gradient(circle at ${Math.random()*100}% ${Math.random()*100}%, rgba(255,255,255,0.2), transparent 40%)`;
}

function generate(){
    let name=document.getElementById("nameInput").value || "GM";
    let container=document.getElementById("container");
    container.innerHTML="";
    let used=new Set();
    let count=0;

    while(count<1000){

        let grad=gradients[Math.floor(Math.random()*gradients.length)];
        let pattern=randomPattern();
        let depth=(Math.random()*6+2).toFixed(1);
        let rotateBase=(Math.random()*40-20).toFixed(1);
        let spacing=(Math.random()*-10).toFixed(1);

        let key=grad+pattern+depth+rotateBase+spacing;
        if(used.has(key)) continue;
        used.add(key);

        let wrapper=document.createElement("div");

        let locket=document.createElement("div");
        locket.className="locket";
        locket.style.background=grad+","+pattern;
        locket.style.boxShadow=`inset 0 0 ${depth*5}px rgba(0,0,0,0.6), 0 0 ${depth*3}px rgba(255,255,255,0.3)`;

        let nameDiv=document.createElement("div");
        nameDiv.className="name";
        nameDiv.style.letterSpacing=spacing+"px";

        for(let char of name){
            let span=document.createElement("span");
            span.className="letter";
            span.innerText=char;
            span.style.background=grad;
            span.style.webkitBackgroundClip="text";
            span.style.webkitTextFillColor="transparent";
            span.style.transform="rotate("+(Math.random()*40-20)+"deg)";
            span.style.textShadow=
                depth+"px "+depth+"px "+(depth+3)+"px rgba(0,0,0,0.8)";
            nameDiv.appendChild(span);
        }

        locket.appendChild(nameDiv);
        wrapper.appendChild(locket);

        let btn=document.createElement("button");
        btn.innerText="Download";
        btn.className="download";
        btn.onclick=function(){
            html2canvas(locket,{backgroundColor:null,scale:4}).then(canvas=>{
                let link=document.createElement("a");
                link.href=canvas.toDataURL("image/png");
                link.download=name+"_GM_Locket.png";
                link.click();
            });
        }

        wrapper.appendChild(btn);
        container.appendChild(wrapper);

        count++;
    }
}

</script>

</body>
</html>
