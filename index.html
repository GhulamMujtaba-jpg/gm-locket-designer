<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM 3D Locket Designer Pro</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:0;
}

.banner{
    font-size:35px;
    padding:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0080,#7928ca,#00ffff);
    background-size:300% 300%;
    animation: gradientMove 5s infinite alternate;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

input{
    padding:10px;
    width:250px;
    margin:20px;
    border-radius:8px;
    border:none;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    font-weight:bold;
}

#generateBtn{ background:#ff4081; color:white; }

.category-title{
    margin-top:40px;
    font-size:22px;
    color:#00ffff;
}

.design-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.design-card{
    padding:20px;
    border-radius:20px;
    transition:0.3s;
    position:relative;
}

.design-card:hover{
    transform:scale(1.1) rotateY(10deg);
}

.locket{
    padding:20px;
    font-size:20px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,0.6);
}

.heart{ border-radius:50% 50% 0 0; transform:rotate(-45deg); }
.circle{ border-radius:50%; }
.oval{ border-radius:50% / 40%; }
.square{ border-radius:10px; }
.rectangle{ border-radius:15px; }
.star{ clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
.infinity{ border-radius:50px; }

.download-btn{
    margin-top:10px;
    background:#ffcc00;
    color:black;
}

</style>
</head>
<body>

<div class="banner">GM 3D Locket Designer PRO</div>

<input type="text" id="nameInput" placeholder="Enter Name">
<br>
<button id="generateBtn">Generate All Designs</button>

<div id="designArea"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const categories = {

"1. Shape Based Lockets":[
{class:"heart", shape:"Heart"},
{class:"circle", shape:"Circle"},
{class:"oval", shape:"Oval"},
{class:"square", shape:"Square"},
{class:"rectangle", shape:"Rectangle"},
{class:"star", shape:"Star"},
{class:"infinity", shape:"Infinity"}
],

"2. Love / Couple Lockets":[
{class:"heart", shape:"Half Heart"},
{class:"circle", shape:"King & Queen"},
{class:"oval", shape:"Puzzle Piece"}
],

"3. Kids Lockets":[
{class:"circle", shape:"Teddy"},
{class:"square", shape:"Unicorn"},
{class:"oval", shape:"Crown Princess"}
]

};

const colors=[
"#ff4d4d","#ff944d","#ffff4d","#4dff4d","#4dffff",
"#4d4dff","#ff4dff","#ff1a75","#00ccff","#ffcc00"
];

function generateDesigns(name){

let designArea=document.getElementById("designArea");
designArea.innerHTML="";

for(let category in categories){

let title=document.createElement("div");
title.className="category-title";
title.innerText=category;
designArea.appendChild(title);

let container=document.createElement("div");
container.className="design-container";

categories[category].forEach(item=>{

let card=document.createElement("div");
card.className="design-card";
card.style.background=`linear-gradient(135deg, ${randomColor()}, #000)`;

let locket=document.createElement("div");
locket.className="locket "+item.class;
locket.style.background=randomColor();
locket.innerText=name;

let btn=document.createElement("button");
btn.className="download-btn";
btn.innerText="Download";

btn.onclick=function(){
html2canvas(locket,{backgroundColor:null,scale:3}).then(canvas=>{
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download=name+"_GM_Locket.png";
link.click();
});
};

card.appendChild(locket);
card.appendChild(btn);
container.appendChild(card);

});

designArea.appendChild(container);
}

}

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

document.getElementById("generateBtn").addEventListener("click",()=>{
let name=document.getElementById("nameInput").value || "GM";
generateDesigns(name);
});

</script>

</body>
</html>
