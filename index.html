<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GM Ultimate 3D Locket Designer</title>
    <meta name="description" content="Create 1000+ 3D unique locket designs with names, Islamic background icons, hearts, arrows, stars and more. Perfect for printing.">
    <meta name="keywords" content="3D locket, name locket, Islamic icon, heart, arrow, 3D logo, custom locket, download PNG, unique design, GM locket designer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            text-align:center;
            font-family:Arial, sans-serif;
            background:#111;
            color:white;
        }
        input{
            padding:10px;
            width:250px;
            margin-top:20px;
            font-size:16px;
            border-radius:5px;
            border:none;
        }
        button{
            padding:8px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            margin:5px;
        }
        #generateBtn{ background:#ff4081; color:white; }
        #generateBtn:hover{ background:#e91e63; }
        #downloadAllBtn{ background:#4CAF50; color:white; }
        #downloadAllBtn:hover{ background:#45a049; }

        .design-container{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .design-card{
            width:130px;
            height:130px;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            perspective:500px;
            transition: transform 0.3s;
        }
        .design-card:hover{
            transform: rotateY(10deg) rotateX(10deg) scale(1.1);
        }

        .design-circle{
            width:110px;
            height:110px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background-size:cover;
            box-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(255,0,255,0.3);
            position:relative;
        }

        .design-text{
            position:absolute;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-wrap:wrap;
            gap:-5px; /* overlap letters */
            color:white;
            font-weight:bold;
        }

        .letter{
            display:inline-block;
        }

        .download-btn{
            background:#ffcc00;
            color:black;
            font-size:12px;
            margin-top:5px;
            border-radius:5px;
        }
        .download-btn:hover{
            background:#ffaa00;
        }
    </style>
</head>
<body>

<h1>GM Ultimate 3D Locket Designer</h1>
<input type="text" id="nameInput" placeholder="Enter Name">
<button id="generateBtn">Generate 1000 Designs</button>
<button id="downloadAllBtn">Download All PNG</button>

<div class="design-container" id="allDesigns"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Background images (Islamic, hearts, arrows)
const backgrounds = [
    "https://img.icons8.com/emoji/96/000000/mosque.png",
    "https://img.icons8.com/emoji/96/000000/star-emoji.png",
    "https://img.icons8.com/emoji/96/000000/moon-emoji.png",
    "https://img.icons8.com/emoji/96/000000/red-heart.png",
    "https://img.icons8.com/emoji/96/000000/arrow.png"
];

const fonts = ["Cursive","Arial Black","Impact","Trebuchet MS","Verdana","Tahoma","Georgia","Comic Sans MS","Courier New","Lucida Console"];

function generateUniqueDesigns(name){
    const container = document.getElementById("allDesigns");
    container.innerHTML="";
    let usedCombos = new Set();
    let count = 0;

    while(count<1000){
        let bg = backgrounds[Math.floor(Math.random()*backgrounds.length)];
        let font = fonts[Math.floor(Math.random()*fonts.length)];
        let rotateX = (Math.random()*20)-10;
        let rotateY = (Math.random()*20)-10;
        let scale = (Math.random()*0.4)+0.8;

        let comboKey = bg+"|"+font+"|"+rotateX.toFixed(1)+"|"+rotateY.toFixed(1)+"|"+scale.toFixed(2);
        if(usedCombos.has(comboKey)) continue;
        usedCombos.add(comboKey);

        // Card
        let card = document.createElement("div");
        card.className="design-card";

        // Circle
        let circle = document.createElement("div");
        circle.className="design-circle";
        circle.style.backgroundImage = `url(${bg})`;

        // Name with overlapped letters
        let textDiv = document.createElement("div");
        textDiv.className="design-text";
        for(let char of name){
            let span = document.createElement("span");
            span.className="letter";
            span.innerText = char;
            span.style.fontFamily = font;
            span.style.transform = `rotate(${Math.random()*20-10}deg) scale(${scale})`;
            textDiv.appendChild(span);
        }

        // Individual download
        let downloadBtn = document.createElement("button");
        downloadBtn.className="download-btn";
        downloadBtn.innerText="Download";
        downloadBtn.addEventListener("click", ()=>{
            html2canvas(circle,{backgroundColor:null}).then(canvas=>{
                let link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download=name+"_locket.png";
                link.click();
            });
        });

        circle.appendChild(textDiv);
        card.appendChild(circle);
        card.appendChild(downloadBtn);
        container.appendChild(card);
        count++;
    }
}

// Generate button
document.getElementById("generateBtn").addEventListener("click", ()=>{
    let name = document.getElementById("nameInput").value || "GM";
    generateUniqueDesigns(name);
});

// Download all
document.getElementById("downloadAllBtn").addEventListener("click", ()=>{
    let container = document.getElementById("allDesigns");
    html2canvas(container,{backgroundColor:null}).then(canvas=>{
        let link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download="GM_Locket_Designs_All.png";
        link.click();
    });
});
</script>

</body>
</html>
