<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM 1000 Ultra PRO Locket Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#0e0e0e;
    color:white;
    text-align:center;
    font-family:Arial;
}

input{
    padding:12px;
    width:260px;
    font-size:16px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
}

#generateBtn{background:gold;}
.container{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
}

.locket{
    width:200px;
    height:200px;
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:linear-gradient(45deg,#d4af37,#f7e98e,#b8860b);
    box-shadow:
        inset 0 0 30px rgba(0,0,0,0.6),
        0 0 30px rgba(255,215,0,0.3);
}

.locket::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    background:radial-gradient(circle at 30% 20%, #ffffff88, transparent 50%);
}

.name{
    position:absolute;
    display:flex;
    letter-spacing:-8px;
    font-size:35px;
    font-weight:bold;
}

.letter{
    display:inline-block;
    transform-origin:center;
}

.gold{
    background:linear-gradient(#fff8dc,#ffd700,#b8860b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:2px 2px 3px rgba(0,0,0,0.7);
}

.silver{
    background:linear-gradient(#ffffff,#c0c0c0,#808080);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:2px 2px 3px rgba(0,0,0,0.7);
}

.download{
    margin-top:8px;
    font-size:12px;
    background:white;
    color:black;
    padding:5px 10px;
}
</style>
</head>

<body>

<h2>GM 1000 Ultra PRO Locket Generator</h2>

<input type="text" id="nameInput" placeholder="Enter Name">
<br><br>
<button id="generateBtn">Generate 1000 Designs</button>

<div class="container" id="container"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function generate(){
    let name=document.getElementById("nameInput").value || "GM";
    let container=document.getElementById("container");
    container.innerHTML="";

    let used=new Set();
    let count=0;

    while(count<1000){

        let metal=Math.random()>0.5?"gold":"silver";
        let rotateBase=(Math.random()*40-20).toFixed(1);
        let embossDepth=(Math.random()*5+1).toFixed(1);

        let key=metal+"-"+rotateBase+"-"+embossDepth;
        if(used.has(key)) continue;
        used.add(key);

        let wrapper=document.createElement("div");

        let locket=document.createElement("div");
        locket.className="locket";

        // random metal background
        if(metal==="silver"){
            locket.style.background="linear-gradient(45deg,#ffffff,#c0c0c0,#808080)";
        }

        let nameDiv=document.createElement("div");
        nameDiv.className="name";

        for(let char of name){
            let span=document.createElement("span");
            span.className="letter "+metal;
            span.innerText=char;
            span.style.transform="rotate("+(Math.random()*40-20)+"deg)";
            span.style.textShadow=
                embossDepth+"px "+embossDepth+"px "+(embossDepth+2)+"px rgba(0,0,0,0.8)";
            nameDiv.appendChild(span);
        }

        locket.appendChild(nameDiv);
        wrapper.appendChild(locket);

        let btn=document.createElement("button");
        btn.innerText="Download";
        btn.className="download";

        btn.onclick=function(){
            html2canvas(locket,{backgroundColor:null,scale:4}).then(canvas=>{
                let link=document.createElement("a");
                link.href=canvas.toDataURL("image/png");
                link.download=name+"_GM_Locket.png";
                link.click();
            });
        }

        wrapper.appendChild(btn);
        container.appendChild(wrapper);

        count++;
    }
}

document.getElementById("generateBtn").addEventListener("click",generate);

</script>

</body>
</html>
